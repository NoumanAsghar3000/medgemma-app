<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MedGemma Assistant</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f2f3d" />
<style>
  :root{
    --ink:#0f2f3d;
    --ink-soft:#3a5a68;
    --paper:#f6f7f5;
    --panel:#ffffff;
    --line:#dfe6e3;
    --accent:#1f6f5c;
    --accent-soft:#e4f0ec;
    --warn:#8a1f1f;
    --warn-soft:#fbeaea;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  header{
    padding:18px 20px 14px;
    background:var(--ink);
    color:#eef4f2;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  header h1{
    font-size:17px;
    margin:0;
    font-weight:600;
    letter-spacing:0.2px;
  }
  header .sub{
    font-size:11.5px;
    color:#9fb9b3;
    margin-top:2px;
  }
  #settingsBtn{
    background:none;
    border:1px solid #35545e;
    color:#cfe3de;
    border-radius:10px;
    padding:6px 10px;
    font-size:12px;
    cursor:pointer;
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:16px;
    gap:14px;
    max-width:720px;
    width:100%;
    margin:0 auto;
    overflow-y:auto;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
  }
  .msg{
    border-radius:var(--radius);
    padding:14px 16px;
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
  }
  .msg.user{background:var(--accent-soft); border:1px solid #cfe4dc;}
  .msg.assistant{background:var(--panel); border:1px solid var(--line);}
  .msg .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:6px;
    font-weight:600;
  }
  .disclaimer{
    background:var(--warn-soft);
    border:1px solid #f0cfcf;
    color:var(--warn);
    font-size:11.5px;
    padding:8px 10px;
    border-radius:10px;
    margin-top:8px;
  }
  .download-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:10px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:9px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .preview-thumb{
    max-width:160px;
    border-radius:10px;
    margin-bottom:8px;
    display:block;
  }
  .composer{
    position:sticky;
    bottom:0;
    background:var(--paper);
    padding-top:6px;
  }
  .composer-inner{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  textarea{
    border:none;
    resize:none;
    font-size:14.5px;
    font-family:inherit;
    padding:6px 4px;
    min-height:44px;
    max-height:140px;
    outline:none;
    background:transparent;
    color:var(--ink);
  }
  .composer-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .icon-btn{
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:10px;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:16px;
    flex-shrink:0;
  }
  #sendBtn{
    margin-left:auto;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:0 18px;
    height:38px;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
  }
  #sendBtn:disabled{opacity:0.5;}
  #imagePreviewBar{
    display:none;
    align-items:center;
    gap:8px;
    font-size:12px;
    color:var(--ink-soft);
  }
  #imagePreviewBar img{width:34px;height:34px;border-radius:8px;object-fit:cover;}
  #imagePreviewBar button{
    border:none;background:none;color:var(--warn);cursor:pointer;font-size:12px;
  }
  .status{
    font-size:12.5px;
    color:var(--ink-soft);
    padding:0 4px;
  }
  dialog{
    border:none;
    border-radius:var(--radius);
    padding:20px;
    width:min(340px, 88vw);
  }
  dialog label{display:block;font-size:12.5px;color:var(--ink-soft);margin:10px 0 4px;}
  dialog input{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:8px;
    font-size:13.5px;
  }
  dialog .row{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}
  dialog button{
    border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;border:1px solid var(--line);background:#fff;
  }
  dialog button.primary{background:var(--accent);color:#fff;border:none;}
</style>
</head>
<body>

<header>
  <div>
    <h1>MedGemma Assistant</h1>
    <div class="sub">Private analysis tool — not a diagnosis</div>
  </div>
  <button id="settingsBtn">⚙ Settings</button>
</header>

<main id="thread">
  <div class="card">
    Enter a note, upload an image, or both, then send. The analysis and a
    downloadable PDF report will appear below.
  </div>
</main>

<div class="composer">
  <div class="composer-inner">
    <div id="imagePreviewBar">
      <img id="imagePreviewThumb" alt="" />
      <span id="imagePreviewName"></span>
      <button id="clearImageBtn">Remove</button>
    </div>
    <textarea id="textInput" placeholder="Describe symptoms, notes, or a question about the attached image..."></textarea>
    <div class="composer-row">
      <button class="icon-btn" id="attachBtn" title="Attach image">📎</button>
      <input type="file" id="fileInput" accept="image/*" hidden />
      <span class="status" id="statusText"></span>
      <button id="sendBtn">Analyze</button>
    </div>
  </div>
</div>

<dialog id="settingsDialog">
  <h3 style="margin:0 0 4px;font-size:15px;">Connection settings</h3>
  <p style="font-size:12px;color:var(--ink-soft);margin:0;">
    Point this app at your Hugging Face Space and its API key.
  </p>
  <label for="apiBaseInput">Space API URL</label>
  <input id="apiBaseInput" placeholder="https://your-username-your-space.hf.space" />
  <label for="apiKeyInput">API key</label>
  <input id="apiKeyInput" placeholder="the API_KEY secret you set on the Space" />
  <label for="hfTokenInput">Hugging Face token</label>
  <input id="hfTokenInput" placeholder="hf_... (required because the Space is private)" />
  <div class="row">
    <button id="settingsCancel">Cancel</button>
    <button id="settingsSave" class="primary">Save</button>
  </div>
</dialog>

<script>
const thread = document.getElementById('thread');
const textInput = document.getElementById('textInput');
const fileInput = document.getElementById('fileInput');
const attachBtn = document.getElementById('attachBtn');
const sendBtn = document.getElementById('sendBtn');
const statusText = document.getElementById('statusText');
const imagePreviewBar = document.getElementById('imagePreviewBar');
const imagePreviewThumb = document.getElementById('imagePreviewThumb');
const imagePreviewName = document.getElementById('imagePreviewName');
const clearImageBtn = document.getElementById('clearImageBtn');

const settingsDialog = document.getElementById('settingsDialog');
const apiBaseInput = document.getElementById('apiBaseInput');
const apiKeyInput = document.getElementById('apiKeyInput');
const hfTokenInput = document.getElementById('hfTokenInput');

let selectedFile = null;

function loadSettings() {
  apiBaseInput.value = localStorage.getItem('mg_api_base') || '';
  apiKeyInput.value = localStorage.getItem('mg_api_key') || '';
  hfTokenInput.value = localStorage.getItem('mg_hf_token') || '';
}
document.getElementById('settingsBtn').onclick = () => { loadSettings(); settingsDialog.showModal(); };
document.getElementById('settingsCancel').onclick = () => settingsDialog.close();
document.getElementById('settingsSave').onclick = () => {
  localStorage.setItem('mg_api_base', apiBaseInput.value.trim().replace(/\/+$/,''));
  localStorage.setItem('mg_api_key', apiKeyInput.value.trim());
  localStorage.setItem('mg_hf_token', hfTokenInput.value.trim());
  settingsDialog.close();
};

// First run: force settings open if nothing configured yet
window.addEventListener('load', () => {
  if (!localStorage.getItem('mg_api_base')) {
    loadSettings();
    settingsDialog.showModal();
  }
});

attachBtn.onclick = () => fileInput.click();
fileInput.onchange = () => {
  const f = fileInput.files[0];
  if (!f) return;
  selectedFile = f;
  imagePreviewThumb.src = URL.createObjectURL(f);
  imagePreviewName.textContent = f.name;
  imagePreviewBar.style.display = 'flex';
};
clearImageBtn.onclick = () => {
  selectedFile = null;
  fileInput.value = '';
  imagePreviewBar.style.display = 'none';
};

function addMessage(role, html) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = html;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  return div;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function downloadPdfBase64(base64, filename) {
  const byteChars = atob(base64);
  const bytes = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || 'report.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  return url; // keep for the manual button too
}

async function sendAnalysis() {
  const apiBase = localStorage.getItem('mg_api_base');
  const apiKey = localStorage.getItem('mg_api_key');
  const hfToken = localStorage.getItem('mg_hf_token');
  if (!apiBase || !apiKey || !hfToken) {
    loadSettings();
    settingsDialog.showModal();
    return;
  }

  const text = textInput.value.trim();
  if (!text && !selectedFile) return;

  let userHtml = '<div class="label">You</div>';
  if (selectedFile) {
    userHtml += `<img class="preview-thumb" src="${URL.createObjectURL(selectedFile)}" />`;
  }
  if (text) userHtml += escapeHtml(text);
  addMessage('user', userHtml);

  textInput.value = '';
  sendBtn.disabled = true;
  statusText.textContent = 'Analyzing — this can take a minute on CPU...';

  const formData = new FormData();
  formData.append('text', text);
  if (selectedFile) formData.append('image', selectedFile);

  const fileToClear = selectedFile;
  clearImageBtn.onclick(); // reset composer image state

  try {
    const res = await fetch(apiBase + '/analyze', {
      method: 'POST',
      headers: {
        'X-API-Key': apiKey,
        'Authorization': 'Bearer ' + hfToken,
      },
      body: formData,
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Server returned ${res.status}: ${errText}`);
    }
    const data = await res.json();

    const pdfUrl = downloadPdfBase64(data.pdf_base64, data.filename);

    addMessage('assistant', `
      <div class="label">MedGemma Analysis</div>
      ${escapeHtml(data.analysis_text)}
      <div class="disclaimer">${escapeHtml(data.disclaimer)}</div>
      <button class="download-btn" onclick="window.open('${pdfUrl}', '_blank')">⬇ Download PDF report</button>
    `);
    statusText.textContent = 'Done. If the PDF didn\'t auto-download, use the button above.';
  } catch (err) {
    addMessage('assistant', `<div class="label">Error</div>${escapeHtml(err.message)}`);
    statusText.textContent = '';
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.onclick = sendAnalysis;
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAnalysis();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
