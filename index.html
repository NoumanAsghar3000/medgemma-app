<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MedGemma Assistant</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f2f3d" />
<style>
  :root{
    --ink:#0f2f3d;
    --ink-soft:#3a5a68;
    --paper:#f6f7f5;
    --panel:#ffffff;
    --line:#dfe6e3;
    --accent:#1f6f5c;
    --accent-soft:#e4f0ec;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:var(--paper);
    color:var(--ink);
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }
  header{
    padding:16px 20px;
    background:var(--ink);
    color:#eef4f2;
    -webkit-user-select:none;
    user-select:none;
  }
  header h1{
    font-size:17px;
    margin:0;
    font-weight:600;
    letter-spacing:0.2px;
  }
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    padding:16px;
    gap:14px;
    max-width:720px;
    width:100%;
    margin:0 auto;
    overflow-y:auto;
  }
  .msg{
    border-radius:var(--radius);
    padding:14px 16px;
    font-size:14.5px;
    line-height:1.55;
  }
  .msg.user{background:var(--accent-soft); border:1px solid #cfe4dc;}
  .msg.assistant{background:var(--panel); border:1px solid var(--line);}
  .msg .label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--ink-soft);
    margin-bottom:6px;
    font-weight:600;
  }
  .disclaimer-line{
    color:#9aa0a6;
    font-size:10.5px;
    margin-top:10px;
    padding-top:8px;
    border-top:1px solid var(--line);
  }
  .download-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-top:10px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:9px 14px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .preview-thumb{
    max-width:140px;
    border-radius:10px;
    margin:0 6px 6px 0;
    display:inline-block;
  }
  .file-chip-img{
    max-width:140px;
    max-height:140px;
    border-radius:10px;
  }
  .file-chip-doc{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:6px 10px;
    font-size:12.5px;
    margin:0 6px 6px 0;
  }
  .composer{
    position:sticky;
    bottom:0;
    background:var(--paper);
    padding-top:6px;
  }
  .composer-inner{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  textarea{
    border:none;
    resize:none;
    font-size:14.5px;
    font-family:inherit;
    padding:6px 4px;
    min-height:44px;
    max-height:140px;
    outline:none;
    background:transparent;
    color:var(--ink);
  }
  .composer-row{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .icon-btn{
    border:1px solid var(--line);
    background:var(--paper);
    border-radius:10px;
    width:38px;
    height:38px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    font-size:16px;
    flex-shrink:0;
  }
  #sendBtn{
    margin-left:auto;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:0 18px;
    height:38px;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
  }
  #sendBtn:disabled{opacity:0.5;}
  #attachPreviewBar{
    display:none;
    flex-wrap:wrap;
    align-items:flex-start;
    padding:2px 2px 0;
  }
  .file-chip-wrap{
    position:relative;
    display:inline-block;
  }
  .file-chip-remove{
    position:absolute;
    top:-4px; right:2px;
    background:#8a1f1f;
    color:#fff;
    border:none;
    border-radius:50%;
    width:18px; height:18px;
    font-size:11px;
    line-height:18px;
    text-align:center;
    cursor:pointer;
    padding:0;
  }
  .status{
    font-size:12.5px;
    color:var(--ink-soft);
    padding:0 4px;
  }
</style>
</head>
<body>

<header>
  <h1>MedGemma Assistant</h1>
</header>

<main id="thread"></main>

<div class="composer">
  <div class="composer-inner">
    <div id="attachPreviewBar"></div>
    <textarea id="textInput" placeholder="Describe symptoms, notes, or a question about the attached files..."></textarea>
    <div class="composer-row">
      <button class="icon-btn" id="cameraBtn" title="Take photo">📷</button>
      <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
      <button class="icon-btn" id="attachBtn" title="Attach files">📎</button>
      <input type="file" id="fileInput" accept="image/*,application/pdf,.pdf" multiple hidden />
      <span class="status" id="statusText"></span>
      <button id="sendBtn">Analyze</button>
    </div>
  </div>
</div>

<script>
// ---------------------------------------------------------------------
// Backend connection — hardcoded so there's no in-app Settings screen.
// If you ever redeploy the backend to a new URL or rotate the API key,
// update the two constants below and re-publish this file.
// ---------------------------------------------------------------------
const API_BASE = "https://noumanasghar3000--medgemma-app-medgemmamodel-web.modal.run";
const API_KEY = "GHY89-45LOP-VHK60";
// ---------------------------------------------------------------------

const thread = document.getElementById('thread');
const textInput = document.getElementById('textInput');
const fileInput = document.getElementById('fileInput');
const cameraInput = document.getElementById('cameraInput');
const attachBtn = document.getElementById('attachBtn');
const cameraBtn = document.getElementById('cameraBtn');
const sendBtn = document.getElementById('sendBtn');
const statusText = document.getElementById('statusText');
const attachPreviewBar = document.getElementById('attachPreviewBar');

let selectedFiles = []; // {file, id}
let fileIdCounter = 0;

attachBtn.onclick = () => fileInput.click();
cameraBtn.onclick = () => cameraInput.click();

function addFiles(fileList) {
  for (const f of fileList) {
    selectedFiles.push({ file: f, id: fileIdCounter++ });
  }
  renderAttachPreview();
}
fileInput.onchange = () => { addFiles(fileInput.files); fileInput.value = ''; };
cameraInput.onchange = () => { addFiles(cameraInput.files); cameraInput.value = ''; };

function renderAttachPreview() {
  attachPreviewBar.innerHTML = '';
  if (selectedFiles.length === 0) {
    attachPreviewBar.style.display = 'none';
    return;
  }
  attachPreviewBar.style.display = 'flex';
  for (const entry of selectedFiles) {
    const wrap = document.createElement('div');
    wrap.className = 'file-chip-wrap';
    if (entry.file.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.className = 'file-chip-img';
      img.src = URL.createObjectURL(entry.file);
      wrap.appendChild(img);
    } else {
      const chip = document.createElement('div');
      chip.className = 'file-chip-doc';
      chip.textContent = '📄 ' + entry.file.name;
      wrap.appendChild(chip);
    }
    const removeBtn = document.createElement('button');
    removeBtn.className = 'file-chip-remove';
    removeBtn.textContent = '✕';
    removeBtn.onclick = () => {
      selectedFiles = selectedFiles.filter(e => e.id !== entry.id);
      renderAttachPreview();
    };
    wrap.appendChild(removeBtn);
    attachPreviewBar.appendChild(wrap);
  }
}

function addMessage(role, html) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = html;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
  return div;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatAnalysisText(s) {
  // Matches the PDF's formatting conventions: **bold** sub-headings render
  // bold, and "* item" bullet lines render as real bullets instead of
  // literal asterisks.
  const escaped = escapeHtml(s);
  const lines = escaped.split('\n').map(line => {
    const trimmed = line.trim();
    if (trimmed.startsWith('* ') || trimmed.startsWith('- ')) {
      return '&nbsp;&nbsp;&#8226;&nbsp; ' + trimmed.slice(2).trim();
    }
    return line;
  });
  let html = lines.join('<br>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  return html;
}

function downloadPdfBase64(base64, filename) {
  const byteChars = atob(base64);
  const bytes = new Uint8Array(byteChars.length);
  for (let i = 0; i < byteChars.length; i++) bytes[i] = byteChars.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename || 'report.pdf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  return url;
}

async function sendAnalysis() {
  const text = textInput.value.trim();
  if (!text && selectedFiles.length === 0) return;

  let userHtml = '<div class="label">You</div>';
  for (const entry of selectedFiles) {
    if (entry.file.type.startsWith('image/')) {
      userHtml += `<img class="preview-thumb" src="${URL.createObjectURL(entry.file)}" />`;
    } else {
      userHtml += `<div class="file-chip-doc" style="margin-bottom:6px;">📄 ${escapeHtml(entry.file.name)}</div>`;
    }
  }
  if (text) userHtml += `<div>${escapeHtml(text)}</div>`;
  addMessage('user', userHtml);

  const filesToSend = selectedFiles.map(e => e.file);
  textInput.value = '';
  selectedFiles = [];
  renderAttachPreview();
  sendBtn.disabled = true;
  statusText.textContent = 'Analyzing...';

  const formData = new FormData();
  formData.append('text', text);
  for (const f of filesToSend) formData.append('files', f);

  try {
    const res = await fetch(API_BASE + '/analyze', {
      method: 'POST',
      headers: { 'X-API-Key': API_KEY },
      body: formData,
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Server returned ${res.status}: ${errText}`);
    }
    const data = await res.json();
    const pdfUrl = downloadPdfBase64(data.pdf_base64, data.filename);

    addMessage('assistant', `
      <div class="label">MedGemma Analysis</div>
      ${formatAnalysisText(data.analysis_text)}
      <div class="disclaimer-line">${escapeHtml(data.disclaimer)}</div>
      <button class="download-btn" onclick="window.open('${pdfUrl}', '_blank')">⬇ Download PDF report</button>
    `);
    statusText.textContent = 'Done. If the PDF didn\'t auto-download, use the button above.';
  } catch (err) {
    addMessage('assistant', `<div class="label">Error</div>${escapeHtml(err.message)}`);
    statusText.textContent = '';
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.onclick = sendAnalysis;
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendAnalysis();
  }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
